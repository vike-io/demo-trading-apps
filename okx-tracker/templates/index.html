<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{brand_name}}</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="description" content="{{tagline}}">
  <meta property="og:title" content="{{name}}">
  <meta property="og:description" content="{{tagline}}">
  <meta property="og:type" content="website">
  <style>
    :root {
      --bg: #0d1421; --panel: #171b26; --border: #222531;
      --text: #e9edf3; --mute: #8a93a6;
      --green: #16c784; --red: #ea3943;
      --accent: #00b6e8;
    }
    :root[data-theme="light"] {
      --bg: #f8fafc; --panel: #ffffff; --border: #e2e8f0;
      --text: #0f172a; --mute: #64748b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background-color 0.18s, color 0.18s;
    }
    header.top {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 14px;
      padding: 14px 24px;
      background: var(--panel); border-bottom: 1px solid var(--border);
    }
    header.top .brand {
      font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 6px;
    }
    header.top .brand::before { content: "◆"; color: var(--accent); }

    .mode-tabs { display: inline-flex; gap: 2px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 3px; }
    .mode-tabs button { background: transparent; color: var(--mute); border: none; padding: 5px 14px; border-radius: 4px; font-size: 12px; font-weight: 700; letter-spacing: 0.4px; cursor: pointer; }
    .mode-tabs button.active { background: var(--panel); color: var(--text); box-shadow: 0 0 0 1px var(--accent) inset; }

    .controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .controls input, .controls button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
    }
    .controls input { min-width: 220px; }
    .controls button { cursor: pointer; }
    .controls button:hover { border-color: var(--accent); }

    #error {
      margin: 12px 24px 0; padding: 10px 14px;
      background: rgba(234,57,67,0.12); border: 1px solid var(--red); border-radius: 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    #error[hidden] { display: none; }
    #error button { background: var(--red); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

    main { padding: 16px 24px 40px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      position: sticky; top: 56px;
      background: var(--bg);
      color: var(--mute);
      text-align: left;
      font-weight: 500;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    thead th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; }
    tbody tr:hover { background: var(--panel); }
    tbody td { padding: 12px; vertical-align: middle; font-variant-numeric: tabular-nums; }
    td.num { text-align: right; }
    td.rank { color: var(--mute); width: 50px; }
    td.pair .base { color: var(--text); font-weight: 600; }
    td.pair .quote { color: var(--mute); font-size: 11px; margin-left: 2px; text-transform: uppercase; }
    td.up { color: var(--green); }
    td.down { color: var(--red); }
    .skeleton-row td { color: var(--mute); padding: 22px; text-align: center; }
  </style>
  <script>
    (function () { document.documentElement.dataset.theme = localStorage.getItem('cg-theme') || 'dark'; })();
  </script>
</head>
<body>
  <header class="top">
    <div class="brand">{{brand_name}}</div>
    <div class="mode-tabs" id="mode-tabs">
      <button data-mode="spot">Spot</button>
      <button data-mode="swap">USDT-Swap</button>
    </div>
    <div class="controls">
      <button id="theme-toggle" type="button" aria-label="Toggle theme">🌙</button>
      <input id="search" type="search" placeholder="Search BTC, ETH, …">
    </div>
  </header>

  <div id="error" hidden>
    <span id="error-message"></span>
    <button id="retry" type="button">Retry</button>
  </div>

  <main>
    <table>
      <thead>
        <tr>
          <th class="rank">#</th>
          <th>Pair</th>
          <th class="num">Last</th>
          <th class="num">24h %</th>
          <th class="num">24h High</th>
          <th class="num">24h Low</th>
          <th class="num">24h Quote Volume</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr class="skeleton-row"><td colspan="7">Loading markets…</td></tr>
      </tbody>
    </table>
  </main>

  <script>
    const CONFIG = {
      brandName: "{{brand_name}}",
      defaultMode: "{{default_mode}}",
      topNPairs: {{top_n_pairs}}
    };
    const API = "{{api_base}}";

    const state = {
      mode: localStorage.getItem("okx-mode") || CONFIG.defaultMode,
      filter: "",
      rows: []
    };
    let lastAction = null;
    const $ = s => document.querySelector(s);

    function decimalsFor(p) { p = Number(p); if (p>=100) return 2; if (p>=1) return 4; if (p>=0.01) return 5; return 7; }
    function fmtPrice(n, d=2) { if (n==null||n==="") return "—"; return Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}); }
    function fmtBig(n) { if (n==null) return "—"; n=Number(n); if(n>=1e9) return (n/1e9).toFixed(2)+"B"; if(n>=1e6) return (n/1e6).toFixed(2)+"M"; if(n>=1e3) return (n/1e3).toFixed(2)+"K"; return n.toFixed(2); }
    function fmtPct(n) { if (n==null||n==="") return "—"; const v=Number(n); return (v>=0?"+":"")+v.toFixed(2)+"%"; }

    function showError(msg) { $("#error-message").textContent=msg; $("#error").hidden=false; }
    function hideError() { $("#error").hidden=true; }
    async function runAction(fn) {
      lastAction=fn; hideError();
      try { await fn(); }
      catch (err) {
        console.error(err);
        showError(String(err).includes("429")
          ? "OKX rate-limited. Wait a moment and retry."
          : "Could not reach OKX. Check your connection.");
      }
    }

    function instType() { return state.mode === "swap" ? "SWAP" : "SPOT"; }

    async function loadMarkets() {
      const res = await fetch(`${API}/market/tickers?instType=${instType()}`);
      if (!res.ok) throw new Error(`OKX ${res.status}`);
      const body = await res.json();
      if (body.code !== "0") throw new Error(`OKX code ${body.code}`);
      // SPOT instIds end with -USDT; SWAP instIds end with -USDT-SWAP.
      const suffix = state.mode === "swap" ? "-USDT-SWAP" : "-USDT";
      const usdt = (body.data || [])
        .filter(r => r.instId.endsWith(suffix) && Number(r.volCcy24h) > 0)
        .sort((a, b) => Number(b.volCcy24h) - Number(a.volCcy24h))
        .slice(0, CONFIG.topNPairs);
      state.rows = usdt;
      renderRows();
    }

    function renderRows() {
      const tbody = $("#rows");
      const f = state.filter.toLowerCase();
      const rows = state.rows.filter(r => !f || r.instId.toLowerCase().includes(f));
      tbody.innerHTML = rows.map((r, i) => {
        const parts = r.instId.split("-");
        const base = parts[0];
        const quote = parts.slice(1).join("-");
        const dec = decimalsFor(r.last);
        const open = Number(r.open24h);
        const pct = open > 0 ? ((Number(r.last) - open) / open) * 100 : 0;
        return `<tr data-symbol="${r.instId}">
          <td class="rank">${i + 1}</td>
          <td class="pair"><span class="base">${base}</span><span class="quote">/${quote}</span></td>
          <td class="num">${fmtPrice(r.last, dec)}</td>
          <td class="num ${pct >= 0 ? "up" : "down"}">${fmtPct(pct)}</td>
          <td class="num">${fmtPrice(r.high24h, dec)}</td>
          <td class="num">${fmtPrice(r.low24h, dec)}</td>
          <td class="num">${fmtBig(r.volCcy24h)} USDT</td>
        </tr>`;
      }).join("");
    }

    function applyMode(mode) {
      state.mode = mode;
      localStorage.setItem("okx-mode", mode);
      document.querySelectorAll("#mode-tabs button").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
      runAction(loadMarkets);
    }

    function applyTheme(t) {
      document.documentElement.dataset.theme = t;
      localStorage.setItem("cg-theme", t);
      $("#theme-toggle").textContent = t === "light" ? "🌙" : "☀️";
    }

    function bindEvents() {
      $("#mode-tabs").addEventListener("click", e => {
        const btn = e.target.closest("button[data-mode]");
        if (btn) applyMode(btn.dataset.mode);
      });
      $("#search").addEventListener("input", e => { state.filter = e.target.value; renderRows(); });
      $("#rows").addEventListener("click", e => {
        const tr = e.target.closest("tr[data-symbol]");
        if (!tr) return;
        location.href = `./trade.html?symbol=${encodeURIComponent(tr.dataset.symbol)}&mode=${state.mode}`;
      });
      $("#theme-toggle").addEventListener("click", () => {
        applyTheme(document.documentElement.dataset.theme === "light" ? "dark" : "light");
      });
      $("#retry").addEventListener("click", () => { if (lastAction) runAction(lastAction); });
      applyTheme(document.documentElement.dataset.theme);
    }

    document.querySelectorAll("#mode-tabs button").forEach(b => b.classList.toggle("active", b.dataset.mode === state.mode));
    bindEvents();
    runAction(loadMarkets);
  </script>
</body>
</html>
