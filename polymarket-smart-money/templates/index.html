<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{brand_name}}</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="description" content="{{tagline}}">
  <meta property="og:title" content="{{name}}">
  <meta property="og:description" content="{{tagline}}">
  <meta property="og:type" content="website">
  <style>
    :root {
      --bg: #0d1421; --panel: #171b26; --border: #222531;
      --text: #e9edf3; --mute: #8a93a6;
      --green: #16c784; --red: #ea3943;
      --accent: #6366f1;
      --polymarket: #2d9cdb;
    }
    :root[data-theme="light"] {
      --bg: #f8fafc; --panel: #ffffff; --border: #e2e8f0;
      --text: #0f172a; --mute: #64748b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background-color 0.18s, color 0.18s;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header.top {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 14px 24px;
      background: var(--panel); border-bottom: 1px solid var(--border);
    }
    header.top .brand { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 6px; }
    header.top .brand::before { content: "◆"; color: var(--accent); }

    .mode-tabs { display: inline-flex; gap: 2px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 3px; }
    .mode-tabs button { background: transparent; color: var(--mute); border: none; padding: 6px 14px; border-radius: 4px; font-size: 12px; font-weight: 700; letter-spacing: 0.4px; cursor: pointer; }
    .mode-tabs button.active { background: var(--panel); color: var(--text); box-shadow: 0 0 0 1px var(--accent) inset; }

    .controls { display: flex; align-items: center; gap: 8px; margin-left: auto; flex-wrap: wrap; }
    .ctrl-label { font-size: 11px; color: var(--mute); text-transform: uppercase; letter-spacing: 0.4px; margin-right: 2px; }
    input.num, input.text {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 10px; font-size: 13px;
    }
    input.num { width: 70px; text-align: right; font-variant-numeric: tabular-nums; }
    input.text { width: 140px; }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 7px 12px; font-size: 13px; cursor: pointer; font-weight: 600;
    }
    button:hover:not(:disabled) { border-color: var(--accent); }
    button:disabled { opacity: 0.5; cursor: progress; }
    button.primary { background: var(--accent); color: #fff; border: none; }
    button.primary:hover:not(:disabled) { filter: brightness(1.08); }

    #error {
      margin: 12px 24px 0; padding: 10px 14px;
      background: rgba(234,57,67,0.12); border: 1px solid var(--red); border-radius: 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    #error[hidden] { display: none; }

    .meta {
      max-width: 1200px; margin: 18px auto 6px; padding: 0 24px;
      color: var(--mute); font-size: 12px;
    }
    .meta strong { color: var(--text); }

    main { max-width: 1200px; margin: 0 auto; padding: 8px 24px 60px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      position: sticky; top: 64px;
      background: var(--bg); color: var(--mute);
      text-align: left; font-weight: 500; font-size: 11px;
      letter-spacing: 0.4px; text-transform: uppercase;
      padding: 10px 12px; border-bottom: 1px solid var(--border);
    }
    thead th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--panel); }
    tbody td { padding: 12px; vertical-align: middle; font-variant-numeric: tabular-nums; }
    td.num { text-align: right; }
    td.rank { color: var(--mute); width: 40px; }
    td.market { max-width: 480px; }
    td.market a { color: var(--text); font-weight: 600; }
    td.market a:hover { color: var(--accent); text-decoration: none; }
    td.market .last-ts { color: var(--mute); font-size: 11px; margin-top: 2px; }
    td.expand { width: 24px; text-align: center; color: var(--mute); cursor: pointer; user-select: none; transition: color 0.15s; }
    tbody tr.parent { cursor: pointer; }
    tbody tr.parent:hover td.expand { color: var(--accent); }
    tbody tr.parent.open td.expand { color: var(--accent); }
    tbody tr.detail > td { padding: 0; background: rgba(99,102,241,0.04); border-bottom: 1px solid var(--border); }
    .detail-inner { padding: 16px 20px; }
    .detail-inner.loading { color: var(--mute); font-size: 12px; padding: 14px 20px; }
    .detail-inner.err { color: var(--red); font-size: 12px; padding: 14px 20px; }

    .detail-head {
      display: flex; flex-wrap: wrap; gap: 18px; align-items: baseline;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .detail-head .stat { font-size: 12px; }
    .detail-head .stat .label { color: var(--mute); margin-right: 6px; text-transform: uppercase; letter-spacing: 0.4px; font-size: 10px; }
    .detail-head .stat .value { font-weight: 600; font-variant-numeric: tabular-nums; }
    .detail-head .stat .value.yes { color: var(--green); }
    .detail-head .stat .value.no { color: var(--red); }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 800px) { .detail-grid { grid-template-columns: 1fr; } }
    .holders-section h3 {
      margin: 0 0 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--mute);
    }
    .holders-section h3.yes { color: var(--green); }
    .holders-section h3.no { color: var(--red); }
    .holders-table { width: 100%; border-collapse: collapse; font-size: 12px; font-variant-numeric: tabular-nums; }
    .holders-table th { color: var(--mute); font-size: 10px; font-weight: 500; text-align: left; padding: 4px 8px; text-transform: uppercase; letter-spacing: 0.3px; }
    .holders-table th.num { text-align: right; }
    .holders-table td { padding: 6px 8px; border-top: 1px solid var(--border); }
    .holders-table td.num { text-align: right; }
    .holders-table .wallet { color: var(--text); font-weight: 600; }
    .holders-table .pseudo { color: var(--mute); font-size: 10px; margin-left: 4px; }
    .holders-table .ts { color: var(--mute); font-size: 10px; }
    .holders-table .empty { color: var(--mute); padding: 12px 8px; text-align: center; font-style: italic; }

    .trades-section { margin-top: 18px; padding-top: 12px; border-top: 1px solid var(--border); }
    .trades-section h3 {
      margin: 0 0 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--mute);
    }
    .trades-table { width: 100%; border-collapse: collapse; font-size: 12px; font-variant-numeric: tabular-nums; }
    .trades-table th { color: var(--mute); font-size: 10px; font-weight: 500; text-align: left; padding: 4px 8px; text-transform: uppercase; letter-spacing: 0.3px; }
    .trades-table th.num { text-align: right; }
    .trades-table td { padding: 5px 8px; border-top: 1px solid var(--border); }
    .trades-table td.num { text-align: right; }
    .trades-table tr.buy .side { color: var(--green); }
    .trades-table tr.sell .side { color: var(--red); }
    .trades-table tr.buy.yes .side::before { content: "▲ "; }
    .trades-table .tx a { color: var(--mute); font-family: ui-monospace, "Cascadia Code", Menlo, monospace; font-size: 10px; }
    .trades-table .tx a:hover { color: var(--accent); }
    td.up { color: var(--green); }
    td.down { color: var(--red); }
    td.net.big { font-weight: 700; }
    td.midprice .price { font-weight: 600; }
    .skeleton-row td { color: var(--mute); padding: 22px; text-align: center; }
    .empty-row td { color: var(--mute); padding: 22px; text-align: center; font-size: 12px; }
  </style>
  <script>
    (function () { document.documentElement.dataset.theme = localStorage.getItem('cg-theme') || 'dark'; })();
  </script>
</head>
<body>
  <header class="top">
    <div class="brand">{{brand_name}}</div>
    <div class="mode-tabs" id="mode-tabs">
      <button data-mode="flows" class="active">Flows</button>
      <button data-mode="mispricings">Mispricings</button>
    </div>
    <div class="controls">
      <span class="ctrl-label">Hours</span>
      <input id="hours" class="num" type="number" min="1" max="168" step="1" value="24">
      <span class="ctrl-label">Category</span>
      <input id="category" class="text" type="text" placeholder="all">
      <button id="apply" class="primary" type="button">Apply</button>
      <button id="theme-toggle" type="button" aria-label="Toggle theme">🌙</button>
    </div>
  </header>

  <div id="error" hidden>
    <span id="error-message"></span>
    <button id="retry" type="button">Retry</button>
  </div>

  <div class="meta">
    <span id="meta-status">Loading…</span>
  </div>

  <main>
    <table>
      <thead>
        <tr id="thead-row"></tr>
      </thead>
      <tbody id="rows">
        <tr class="skeleton-row"><td colspan="6">Loading Polymarket smart-money signals…</td></tr>
      </tbody>
    </table>
  </main>

  <script>
    const CONFIG = { brandName: "{{brand_name}}" };
    const VIKE_MCP = "/api/polymarket-smart-money/vike/mcp";

    const state = {
      mode: localStorage.getItem("poly-mode") || "flows",
      rows: []
    };
    let lastAction = null;
    const $ = s => document.querySelector(s);

    function fmtUsd(n) {
      if (n == null || Number.isNaN(Number(n))) return "—";
      const v = Number(n);
      const sign = v < 0 ? "-" : "";
      const abs = Math.abs(v);
      if (abs >= 1e6) return sign + "$" + (abs/1e6).toFixed(2) + "M";
      if (abs >= 1e3) return sign + "$" + (abs/1e3).toFixed(2) + "K";
      return sign + "$" + abs.toFixed(2);
    }
    function fmtInt(n) {
      if (n == null) return "—";
      return Number(n).toLocaleString("en-US");
    }
    function fmtMid(n) {
      if (n == null || n === 0) return "—";
      return (Number(n) * 100).toFixed(1) + "¢";
    }
    function fmtTime(s) {
      if (!s) return "—";
      // Server returns "2026-05-28 18:39:36" (UTC). Show as HH:MM:SS local.
      const d = new Date(s.replace(" ", "T") + "Z");
      const ago = (Date.now() - d.getTime()) / 60000;
      if (ago < 1) return "just now";
      if (ago < 60) return `${Math.round(ago)}m ago`;
      if (ago < 1440) return `${Math.round(ago / 60)}h ago`;
      return `${Math.round(ago / 1440)}d ago`;
    }

    function showError(msg) { $("#error-message").textContent = msg; $("#error").hidden = false; }
    function hideError() { $("#error").hidden = true; }
    async function runAction(fn) {
      lastAction = fn; hideError();
      try { await fn(); }
      catch (err) {
        console.error(err);
        showError("Could not load signals — " + String(err).slice(0, 160));
      }
    }

    async function loadSignals() {
      $("#apply").disabled = true;
      $("#meta-status").textContent = "Loading…";
      const args = {
        mode: state.mode,
        hours: Number($("#hours").value || 24),
        limit: 15
      };
      const cat = $("#category").value.trim();
      if (cat) args.category = cat;
      try {
        const res = await fetch(VIKE_MCP, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            jsonrpc: "2.0", id: 1, method: "tools/call",
            params: { name: "polymarket_smart_money", arguments: args }
          })
        });
        if (!res.ok) throw new Error(`Vike proxy ${res.status}`);
        const env = await res.json();
        if (env.error) throw new Error(`Vike: ${env.error.message || env.error.code}`);
        const text = env.result?.content?.[0]?.text;
        if (!text) throw new Error("Vike returned no content");
        state.rows = JSON.parse(text);
        renderHeader();
        renderRows();
        $("#meta-status").innerHTML =
          `Mode: <strong>${state.mode}</strong>, lookback <strong>${args.hours}h</strong>` +
          (cat ? `, category <strong>${cat}</strong>` : "") +
          `. Cohort = wallets with $1k+ realized PnL across 5+ resolved markets. ` +
          `<em>Source: vike.io/mcp · polymarket_smart_money</em>`;
      } finally {
        $("#apply").disabled = false;
      }
    }

    function renderHeader() {
      const thead = $("#thead-row");
      if (state.mode === "flows") {
        thead.innerHTML = `
          <th class="rank">#</th>
          <th>Market</th>
          <th class="num">Smart wallets</th>
          <th class="num">Net inflow</th>
          <th class="num">Buy</th>
          <th class="num">Sell</th>
          <th class="num">Trades</th>
          <th class="num">Last activity</th>
          <th class="expand"></th>
        `;
      } else {
        thead.innerHTML = `
          <th class="rank">#</th>
          <th>Market</th>
          <th class="num">Smart wallets</th>
          <th class="num">Cohort avg</th>
          <th class="num">Current mid</th>
          <th class="num">Edge</th>
          <th class="num">Last activity</th>
          <th class="expand"></th>
        `;
      }
    }

    function renderRows() {
      const tbody = $("#rows");
      if (!state.rows.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="8">No signals match these filters.</td></tr>`;
        return;
      }
      const colspan = state.mode === "flows" ? 9 : 8;
      tbody.innerHTML = state.rows.map((r, i) => {
        const polyUrl = `https://polymarket.com/event/${r.slug}`;
        const titleCell = `
          <td class="market">
            <a href="${polyUrl}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${r.title || r.slug || "—"}</a>
            <div class="last-ts">${r.slug ? r.slug : ""}</div>
          </td>`;
        let body;
        if (state.mode === "flows") {
          const netCls = r.net_inflow >= 0 ? "up" : "down";
          const big = Math.abs(r.net_inflow) >= 25000 ? " big" : "";
          body = `
            <td class="rank">${i + 1}</td>
            ${titleCell}
            <td class="num">${fmtInt(r.smart_wallets)}</td>
            <td class="num net ${netCls}${big}">${fmtUsd(r.net_inflow)}</td>
            <td class="num up">${fmtUsd(r.buy_inflow)}</td>
            <td class="num down">${fmtUsd(r.sell_outflow)}</td>
            <td class="num">${fmtInt(r.trades)}</td>
            <td class="num">${fmtTime(r.last_ts)}</td>
          `;
        } else {
          const edge = r.edge_bps != null ? r.edge_bps : null;
          const edgeCls = edge != null && edge >= 0 ? "up" : "down";
          body = `
            <td class="rank">${i + 1}</td>
            ${titleCell}
            <td class="num">${fmtInt(r.smart_wallets)}</td>
            <td class="num midprice"><span class="price">${fmtMid(r.cohort_avg_price ?? r.cohort_avg ?? r.avg_buy_price)}</span></td>
            <td class="num midprice"><span class="price">${fmtMid(r.current_mid ?? r.yes_mid)}</span></td>
            <td class="num ${edgeCls}">${edge != null ? (edge >= 0 ? "+" : "") + edge.toFixed(0) + " bps" : "—"}</td>
            <td class="num">${fmtTime(r.last_ts)}</td>
          `;
        }
        return `
          <tr class="parent" data-condition-id="${r.condition_id}">
            ${body}
            <td class="expand" title="Click to see who the smart money is">▾</td>
          </tr>
          <tr class="detail" data-detail-for="${r.condition_id}" hidden>
            <td colspan="${colspan}"><div class="detail-inner"></div></td>
          </tr>
        `;
      }).join("");
    }

    // ----- expand-on-click: market_detail with top holders + recent trades -----
    const detailCache = new Map();

    async function fetchMarketDetail(conditionId) {
      if (detailCache.has(conditionId)) return detailCache.get(conditionId);
      const res = await fetch(VIKE_MCP, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          jsonrpc: "2.0", id: 1, method: "tools/call",
          params: { name: "polymarket_market_detail", arguments: { condition_id: conditionId } }
        })
      });
      if (!res.ok) throw new Error(`Vike proxy ${res.status}`);
      const env = await res.json();
      if (env.error) throw new Error(`Vike: ${env.error.message || env.error.code}`);
      const text = env.result?.content?.[0]?.text;
      if (!text) throw new Error("Vike returned no content");
      const parsed = JSON.parse(text);
      detailCache.set(conditionId, parsed);
      return parsed;
    }

    function shortAddr(a) {
      if (!a) return "—";
      return a.slice(0, 6) + "…" + a.slice(-4);
    }

    function renderHolders(holders, side) {
      if (!holders || !holders.length) return `<div class="empty">No active ${side} positions among tracked wallets.</div>`;
      // Sort by usd_spent desc.
      const sorted = holders.slice().sort((a, b) => (b.usd_spent || 0) - (a.usd_spent || 0)).slice(0, 8);
      const rows = sorted.map(h => {
        const name = h.display_name || h.pseudonym || shortAddr(h.proxy_wallet);
        const link = `https://polymarket.com/profile/${h.proxy_wallet}`;
        return `<tr>
          <td><a class="wallet" href="${link}" target="_blank" rel="noopener noreferrer">${name}</a>${h.pseudonym && h.display_name && h.pseudonym !== h.display_name ? `<span class="pseudo">${h.pseudonym}</span>` : ""}</td>
          <td class="num">${fmtUsd(h.usd_spent)}</td>
          <td class="num">${fmtInt(h.net_shares)}</td>
          <td class="num"><span class="ts">${fmtTime(h.last_ts)}</span></td>
        </tr>`;
      }).join("");
      return `<table class="holders-table">
        <thead><tr><th>Wallet</th><th class="num">USD spent</th><th class="num">Shares</th><th class="num">Last</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function renderTrades(trades) {
      if (!trades || !trades.length) return "";
      const top = trades.slice(0, 20);
      const rows = top.map(t => {
        const name = t.display_name || t.pseudonym || shortAddr(t.proxy_wallet);
        const link = `https://polymarket.com/profile/${t.proxy_wallet}`;
        const isBuy = (t.side || "").toUpperCase() === "BUY";
        const cls = (isBuy ? "buy " : "sell ") + ((t.outcome || "").toLowerCase());
        const tx = t.tx_hash
          ? `<a href="https://polygonscan.com/tx/${t.tx_hash}" target="_blank" rel="noopener noreferrer">${t.tx_hash.slice(0,8)}…</a>`
          : "—";
        return `<tr class="${cls}">
          <td>${fmtTime(t.ts)}</td>
          <td><a class="wallet" href="${link}" target="_blank" rel="noopener noreferrer">${name}</a></td>
          <td class="side">${t.outcome || "—"} ${t.side || ""}</td>
          <td class="num">${fmtMid(t.price)}</td>
          <td class="num">${fmtInt(t.size)}</td>
          <td class="num">${fmtUsd(t.usd)}</td>
          <td class="tx">${tx}</td>
        </tr>`;
      }).join("");
      return `<div class="trades-section">
        <h3>Recent trades (last ${top.length})</h3>
        <table class="trades-table">
          <thead><tr>
            <th>When</th><th>Wallet</th><th>Side</th>
            <th class="num">Price</th><th class="num">Size</th><th class="num">USD</th><th>Tx</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    function renderDetail(detail) {
      const stats = detail.stats || {};
      const yesPrice = (detail.yes_series?.[detail.yes_series.length - 1]?.[1]) ?? null;
      const noPrice = (detail.no_series?.[detail.no_series.length - 1]?.[1]) ?? null;
      const head = `
        <div class="detail-head">
          <div class="stat"><span class="label">Status</span><span class="value">${detail.active ? "Active" : detail.closed ? "Closed" : "—"}</span></div>
          <div class="stat"><span class="label">YES</span><span class="value yes">${fmtMid(yesPrice)}</span></div>
          <div class="stat"><span class="label">NO</span><span class="value no">${fmtMid(noPrice)}</span></div>
          <div class="stat"><span class="label">24h vol</span><span class="value">${fmtUsd(detail.volume_24h)}</span></div>
          <div class="stat"><span class="label">Total vol</span><span class="value">${fmtUsd(detail.volume_total)}</span></div>
          <div class="stat"><span class="label">Wallets</span><span class="value">${fmtInt(stats.wallets_n)}</span></div>
          <div class="stat"><span class="label">Trades</span><span class="value">${fmtInt(stats.trades_n)}</span></div>
        </div>`;
      const grid = `
        <div class="detail-grid">
          <div class="holders-section">
            <h3 class="yes">Top YES holders</h3>
            ${renderHolders(detail.yes_holders, "YES")}
          </div>
          <div class="holders-section">
            <h3 class="no">Top NO holders</h3>
            ${renderHolders(detail.no_holders, "NO")}
          </div>
        </div>`;
      return head + grid + renderTrades(detail.trades);
    }

    async function toggleExpand(conditionId, parentRow) {
      const detailRow = document.querySelector(`tr.detail[data-detail-for="${conditionId}"]`);
      if (!detailRow) return;
      // Collapse if already open.
      if (!detailRow.hidden) {
        detailRow.hidden = true;
        parentRow.classList.remove("open");
        parentRow.querySelector(".expand").textContent = "▾";
        return;
      }
      // Close any other open row.
      document.querySelectorAll("tr.detail").forEach(r => { if (!r.hidden && r !== detailRow) r.hidden = true; });
      document.querySelectorAll("tr.parent.open").forEach(r => {
        if (r !== parentRow) {
          r.classList.remove("open");
          r.querySelector(".expand").textContent = "▾";
        }
      });
      const inner = detailRow.querySelector(".detail-inner");
      detailRow.hidden = false;
      parentRow.classList.add("open");
      parentRow.querySelector(".expand").textContent = "▴";
      if (detailCache.has(conditionId)) {
        inner.innerHTML = renderDetail(detailCache.get(conditionId));
        inner.classList.remove("loading", "err");
        return;
      }
      inner.innerHTML = "Fetching live holders + trade feed…";
      inner.className = "detail-inner loading";
      try {
        const detail = await fetchMarketDetail(conditionId);
        inner.innerHTML = renderDetail(detail);
        inner.className = "detail-inner";
      } catch (err) {
        inner.className = "detail-inner err";
        const msg = String(err);
        if (msg.includes("not found")) {
          inner.textContent = "This market has resolved — no live holder or trade feed available. Try one of the active markets above.";
        } else {
          inner.textContent = "Could not load detail — " + msg.slice(0, 160);
        }
      }
    }

    function applyMode(mode) {
      state.mode = mode;
      localStorage.setItem("poly-mode", mode);
      document.querySelectorAll("#mode-tabs button").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
      runAction(loadSignals);
    }

    function applyTheme(t) {
      document.documentElement.dataset.theme = t;
      localStorage.setItem("cg-theme", t);
      $("#theme-toggle").textContent = t === "light" ? "🌙" : "☀️";
    }

    $("#mode-tabs").addEventListener("click", e => {
      const btn = e.target.closest("button[data-mode]");
      if (btn) applyMode(btn.dataset.mode);
    });
    $("#rows").addEventListener("click", e => {
      // Ignore clicks on the market title link itself.
      if (e.target.closest("a")) return;
      const tr = e.target.closest("tr.parent[data-condition-id]");
      if (!tr) return;
      toggleExpand(tr.dataset.conditionId, tr);
    });
    $("#apply").addEventListener("click", () => runAction(loadSignals));
    $("#theme-toggle").addEventListener("click", () => {
      applyTheme(document.documentElement.dataset.theme === "light" ? "dark" : "light");
    });
    $("#retry").addEventListener("click", () => { if (lastAction) runAction(lastAction); });
    applyTheme(document.documentElement.dataset.theme);

    document.querySelectorAll("#mode-tabs button").forEach(b => b.classList.toggle("active", b.dataset.mode === state.mode));
    runAction(loadSignals);
  </script>
</body>
</html>
