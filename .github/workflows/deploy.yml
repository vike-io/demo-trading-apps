name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/README.md"
      - "**/*.md"
      - "**/tmp/**"
      - "**/docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build dist/
        run: python build.py --clean

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.95.0"
          command: deploy

      - name: Summary
        run: |
          echo "### Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- https://demo.vike.io/" >> $GITHUB_STEP_SUMMARY
          echo "- https://demo-trading-apps.cache-handler.workers.dev/" >> $GITHUB_STEP_SUMMARY
