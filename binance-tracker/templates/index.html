<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{brand_name}}</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="description" content="{{tagline}}">
  <meta property="og:title" content="{{name}}">
  <meta property="og:description" content="{{tagline}}">
  <meta property="og:type" content="website">
  <style>
    :root {
      --bg: #0d1421; --panel: #171b26; --border: #222531;
      --text: #e9edf3; --mute: #8a93a6;
      --green: #16c784; --red: #ea3943;
      --accent: #f0b90b;
    }
    :root[data-theme="light"] {
      --bg: #f8fafc; --panel: #ffffff; --border: #e2e8f0;
      --text: #0f172a; --mute: #64748b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      transition: background-color 0.18s, color 0.18s;
    }
    header.top {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 14px;
      padding: 14px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    header.top .brand {
      font-weight: 700; font-size: 16px;
      display: flex; align-items: center; gap: 6px;
    }
    header.top .brand::before { content: "◆"; color: var(--accent); }

    .mode-tabs {
      display: inline-flex; gap: 2px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px;
    }
    .mode-tabs button {
      background: transparent;
      color: var(--mute);
      border: none;
      padding: 5px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
    }
    .mode-tabs button.active {
      background: var(--panel);
      color: var(--text);
      box-shadow: 0 0 0 1px var(--accent) inset;
    }

    .controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .controls input, .controls button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
    }
    .controls input { min-width: 220px; }
    .controls button { cursor: pointer; }
    .controls button:hover { border-color: var(--accent); }

    #error {
      margin: 12px 24px 0; padding: 10px 14px;
      background: rgba(234,57,67,0.12); border: 1px solid var(--red); border-radius: 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    #error[hidden] { display: none; }
    #error button { background: var(--red); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

    main { padding: 16px 24px 40px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      position: sticky;
      top: 56px;
      background: var(--bg);
      color: var(--mute);
      text-align: left;
      font-weight: 500;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    thead th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; }
    tbody tr:hover { background: var(--panel); }
    tbody tr.active { background: rgba(240,185,11,0.08); }
    tbody td { padding: 12px; vertical-align: middle; font-variant-numeric: tabular-nums; }
    td.num { text-align: right; }
    td.rank { color: var(--mute); width: 50px; }
    td.pair .base { color: var(--text); font-weight: 600; }
    td.pair .quote { color: var(--mute); font-size: 11px; margin-left: 2px; text-transform: uppercase; }
    td.up { color: var(--green); }
    td.down { color: var(--red); }
    td.fund-up { color: var(--red); }    /* high positive funding = expensive for longs → red */
    td.fund-down { color: var(--green); }
    .skeleton-row td { color: var(--mute); padding: 22px; text-align: center; }
  </style>
  <script>
    (function () {
      document.documentElement.dataset.theme = localStorage.getItem('cg-theme') || 'dark';
    })();
  </script>
</head>
<body>
  <header class="top">
    <div class="brand">{{brand_name}}</div>
    <div class="mode-tabs" id="mode-tabs">
      <button data-mode="spot" class="active">Spot</button>
      <button data-mode="perp">USDT-Perp</button>
    </div>
    <div class="controls">
      <button id="theme-toggle" type="button" aria-label="Toggle theme">🌙</button>
      <input id="search" type="search" placeholder="Search BTC, ETH, …">
    </div>
  </header>

  <div id="error" hidden>
    <span id="error-message"></span>
    <button id="retry" type="button">Retry</button>
  </div>

  <main>
    <table>
      <thead>
        <tr>
          <th class="rank">#</th>
          <th>Pair</th>
          <th class="num">Last</th>
          <th class="num">24h %</th>
          <th class="num">24h High</th>
          <th class="num">24h Low</th>
          <th class="num">24h Volume</th>
          <th class="num funding-col" hidden>Funding</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr class="skeleton-row"><td colspan="8">Loading markets…</td></tr>
      </tbody>
    </table>
  </main>

  <script>
    const CONFIG = {
      brandName: "{{brand_name}}",
      defaultMode: "{{default_mode}}",
      topNPairs: {{top_n_pairs}}
    };
    const API_BASE = "{{api_base}}";

    const state = {
      mode: localStorage.getItem("binance-mode") || CONFIG.defaultMode,
      filter: "",
      rows: [],
      funding: {}  // symbol → lastFundingRate (perp only)
    };
    let lastAction = null;
    const $ = s => document.querySelector(s);

    function decimalsFor(p) { p = Number(p); if (p>=100) return 2; if (p>=1) return 4; if (p>=0.01) return 5; return 7; }
    function fmtPrice(n, d=2) { if (n==null||n==="") return "—"; return Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}); }
    function fmtBig(n) { if (n==null) return "—"; n=Number(n); if(n>=1e9) return (n/1e9).toFixed(2)+"B"; if(n>=1e6) return (n/1e6).toFixed(2)+"M"; if(n>=1e3) return (n/1e3).toFixed(2)+"K"; return n.toFixed(2); }
    function fmtPct(n) { if (n==null||n==="") return "—"; const v=Number(n); return (v>=0?"+":"")+v.toFixed(2)+"%"; }
    function fmtFunding(n) {
      if (n == null || n === "") return "—";
      const pct = Number(n) * 100;
      return (pct >= 0 ? "+" : "") + pct.toFixed(4) + "%";
    }

    function showError(msg) { $("#error-message").textContent=msg; $("#error").hidden=false; }
    function hideError() { $("#error").hidden=true; }
    async function runAction(fn) {
      lastAction=fn; hideError();
      try { await fn(); }
      catch (err) {
        console.error(err);
        showError(String(err).includes("429")
          ? "Binance rate-limited. Wait a moment and retry."
          : "Could not reach Binance. Check your connection.");
      }
    }

    async function loadMarkets() {
      // /ticker/24hr returns all symbols on the chosen host (~1.5k spot, ~200 perp).
      const res = await fetch(`${API_BASE}/${state.mode}/ticker/24hr`);
      if (!res.ok) throw new Error(`Binance ${res.status}`);
      const all = await res.json();
      const usdt = all
        .filter(r => r.symbol.endsWith("USDT") && Number(r.quoteVolume) > 0)
        .sort((a, b) => Number(b.quoteVolume) - Number(a.quoteVolume))
        .slice(0, CONFIG.topNPairs);
      state.rows = usdt;
      // Perp mode: fetch all funding rates in one shot, then render.
      if (state.mode === "perp") {
        try {
          const fundRes = await fetch(`${API_BASE}/perp/premiumIndex`);
          if (fundRes.ok) {
            const fund = await fundRes.json();
            state.funding = {};
            for (const f of fund) state.funding[f.symbol] = f.lastFundingRate;
          }
        } catch (e) { /* funding is best-effort */ }
      } else {
        state.funding = {};
      }
      renderRows();
    }

    function renderRows() {
      const tbody = $("#rows");
      const f = state.filter.toLowerCase();
      const rows = state.rows.filter(r => !f || r.symbol.toLowerCase().includes(f));
      const fundingCol = state.mode === "perp";
      document.querySelectorAll(".funding-col").forEach(el => { el.hidden = !fundingCol; });
      tbody.innerHTML = rows.map((r, i) => {
        const base = r.symbol.replace("USDT", "");
        const dec = decimalsFor(r.lastPrice);
        const pct = Number(r.priceChangePercent);
        const fundingRate = state.funding[r.symbol];
        const fundingPct = fundingRate != null ? Number(fundingRate) * 100 : null;
        return `<tr data-symbol="${r.symbol}">
          <td class="rank">${i + 1}</td>
          <td class="pair"><span class="base">${base}</span><span class="quote">/USDT${state.mode === "perp" ? "-PERP" : ""}</span></td>
          <td class="num">${fmtPrice(r.lastPrice, dec)}</td>
          <td class="num ${pct >= 0 ? "up" : "down"}">${fmtPct(pct)}</td>
          <td class="num">${fmtPrice(r.highPrice, dec)}</td>
          <td class="num">${fmtPrice(r.lowPrice, dec)}</td>
          <td class="num">${fmtBig(r.quoteVolume)} USDT</td>
          ${fundingCol ? `<td class="num ${fundingPct == null ? "" : (fundingPct >= 0 ? "fund-up" : "fund-down")}">${fmtFunding(fundingRate)}</td>` : ""}
        </tr>`;
      }).join("");
    }

    function applyMode(mode) {
      state.mode = mode;
      localStorage.setItem("binance-mode", mode);
      // Highlight the active tab.
      document.querySelectorAll("#mode-tabs button").forEach(b => {
        b.classList.toggle("active", b.dataset.mode === mode);
      });
      runAction(loadMarkets);
    }

    function applyTheme(t) {
      document.documentElement.dataset.theme = t;
      localStorage.setItem("cg-theme", t);
      $("#theme-toggle").textContent = t === "light" ? "🌙" : "☀️";
    }

    function bindEvents() {
      $("#mode-tabs").addEventListener("click", e => {
        const btn = e.target.closest("button[data-mode]");
        if (btn) applyMode(btn.dataset.mode);
      });
      $("#search").addEventListener("input", e => {
        state.filter = e.target.value;
        renderRows();
      });
      $("#rows").addEventListener("click", e => {
        const tr = e.target.closest("tr[data-symbol]");
        if (!tr) return;
        location.href = `./trade.html?symbol=${encodeURIComponent(tr.dataset.symbol)}&mode=${state.mode}`;
      });
      $("#theme-toggle").addEventListener("click", () => {
        applyTheme(document.documentElement.dataset.theme === "light" ? "dark" : "light");
      });
      $("#retry").addEventListener("click", () => { if (lastAction) runAction(lastAction); });
      applyTheme(document.documentElement.dataset.theme);
    }

    // Set the initial active tab class then load.
    document.querySelectorAll("#mode-tabs button").forEach(b => {
      b.classList.toggle("active", b.dataset.mode === state.mode);
    });
    bindEvents();
    runAction(loadMarkets);
  </script>
</body>
</html>
